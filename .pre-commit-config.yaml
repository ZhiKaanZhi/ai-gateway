# Run: uv run pre-commit install   (then hooks run on every commit)
# The same three gates run in CI and in the Claude Code PostToolUse hook.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy --strict
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
