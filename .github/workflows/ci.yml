name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      # pgvector container so DB-touching tests can run in later slices.
      # The harness health test needs no DB; this is here ready for the cache slice.
      db:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: gateway
          POSTGRES_DB: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway -d gateway"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (pinned by uv.lock)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy --strict)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -q
        env:
          GATEWAY_DB_HOST: localhost
          GATEWAY_DB_PORT: "5432"
