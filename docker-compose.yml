services:
  db:
    image: pgvector/pgvector:pg18   # pgvector ships inside this image; PG18 = latest major (longest support runway)
    shm_size: 256mb                 # raise (e.g. 1g) if parallel HNSW index builds fail on larger datasets
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    volumes:
      # PG18 images store data in a major-version subdir; mount the parent, not /data,
      # or the container refuses to start (docker-library/postgres#1259).
      - pgdata:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
